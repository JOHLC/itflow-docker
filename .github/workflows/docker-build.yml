name: Build and Push ARM64 Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test-arm64:
    name: Test ARM64 Build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: itflow-arm64-ci-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test ARM64 image
        run: |
          set -e

          echo "=== Architecture check ==="
          docker run --rm itflow-arm64-ci-test:latest uname -m | grep -q aarch64
          echo "ARM64 confirmed"

          echo "=== PHP version check ==="
          docker run --rm itflow-arm64-ci-test:latest php84 -v

          echo "=== Apache (httpd) binary check ==="
          docker run --rm itflow-arm64-ci-test:latest which httpd

          echo "=== PHP extensions check ==="
          required_extensions="intl mysqli curl imap mailparse gd mbstring"
          for ext in $required_extensions; do
            echo "Checking PHP extension: $ext"
            docker run --rm itflow-arm64-ci-test:latest php84 -m | grep -qi "^${ext}$" || {
              echo "Missing required PHP extension: $ext"
              exit 1
            }
          done
          echo "All required PHP extensions are present."

          echo "=== Entrypoint exists and is executable ==="
          docker run --rm itflow-arm64-ci-test:latest test -x /usr/bin/entrypoint.sh
          echo "Entrypoint OK"

          echo "=== All ARM64 tests passed ==="

  build-and-push:
    name: Build and Push ARM64 Image
    runs-on: ubuntu-24.04-arm
    needs: test-arm64
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/johlc/itflow-docker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
